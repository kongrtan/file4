apiVersion: projectcontour.io/v1alpha1
kind: ExtensionService
metadata:
  name: abc-auth-extension
  namespace: abc # 서비스와 동일한 네임스페이스로 지정
spec:
  # abc-service가 일반 HTTP/1.1 앱이라면 h2c(Cleartext)를 지정합니다.
  protocol: h2c 
  services:
    - name: abc-service # 같은 네임스페이스의 메인 서비스를 바로 바라봅니다.
      port: 80
---
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: abc-service-proxy
  namespace: abc # 네임스페이스 통일
spec:
  virtualhost:
    fqdn: abc.com
    tls:
      secretName: abc-com-tls-secret
    # [글로벌 인증 기본 정의]
    authorization:
      extensionRef:
        name: abc-auth-extension
        namespace: abc # 같은 abc 네임스페이스의 Extension을 참조
      authPolicy:
        disabled: true # 기본 / 경로는 인증을 무시 (abc 서비스용)
  routes:
    # -------------------------------------------------------------
    # 1. Grafana 서비스 영역 (인증 후 그라파나 파드로 전달)
    # -------------------------------------------------------------
    - conditions:
        - prefix: /grafana
      services:
        - name: grafana-service
          # 만약 Grafana가 다른 네임스페이스(예: grafana)에 있다면 
          # 아래와 같이 namespace 필드를 명시해 주면 교차 연동됩니다.
          # name: grafana-service
          # namespace: grafana 
          port: 3000
      authorization:
        authPolicy:
          disabled: false # Grafana 접근 시에만 인증 활성화
      # Envoy가 abc-service:80의 특정 경로로 인증 검증 요청을 찌르도록 라우팅 제어
      context:
        pathPrefix: /api/v1/my/grafana/auth
      # 인증 통과 후 가져온 X-User-Id를 Grafana가 인식하는 X-WEBAUTH-USER로 변환 이식
      requestHeadersPolicy:
        set:
          - name: X-WEBAUTH-USER
            value: "%REQ(X-User-Id)%"

    # -------------------------------------------------------------
    # 2. 메인 서비스 영역 (나머지 모든 경로 처리, abc 서비스 담당)
    # -------------------------------------------------------------
    - conditions:
        - prefix: /
      services:
        - name: abc-service
          port: 80
      authorization:
        authPolicy:
          disabled: true # 메인 웹 서비스는 외부 인증 필터를 거치지 않음
