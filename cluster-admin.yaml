# 1. 네임스페이스 생성 (이미 존재하는 경우 생략 가능)
apiVersion: v1
kind: Namespace
metadata:
  name: kubesphere-system

---

# 2. ServiceAccount 생성
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubesphere
  namespace: kubesphere-system

---

# 3. 장기 유효(만료 없음) 토큰 Secret 생성
apiVersion: v1
kind: Secret
metadata:
  name: kubesphere-token
  namespace: kubesphere-system
  annotations:
    kubernetes.io/service-account.name: kubesphere
type: kubernetes.io/service-account-token

---

# 4. Cluster Admin 권한 부여 (ClusterRoleBinding)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubesphere-cluster-admin-binding
subjects:
- kind: ServiceAccount
  name: kubesphere
  namespace: kubesphere-system
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io

