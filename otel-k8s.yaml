receivers:
  # 1. Deploymentмқҳ л©”нҠёлҰӯ(desired, available л“ұ) мҲҳм§‘
  k8scluster:
    collection_interval: 10s
    node_conditions_to_report: [Ready, Ready]
    allocatable_types_to_report: [cpu, memory]

  # 2. Deployment мҳӨлёҢм қнҠёмқҳ мғҒнғң л°Ҹ ліҖкІҪ мқҙлІӨнҠё мҲҳм§‘
  k8sobjects:
    objects:
      - gvr:
          group: "apps"
          version: "v1"
          resource: "deployments"
        mode: watch

processors:
  batch:

exporters:
  # н…ҢмҠӨнҠё л°Ҹ нҷ•мқёмҡ© л””лІ„к·ё м¶ңл Ҙ (мӢӨм ң нҷҳкІҪм—җм„ңлҠ” otlp л“ұмңјлЎң ліҖкІҪ)
  debug:
    verbosity: detailed

service:
  pipelines:
    metrics:
      receivers: [k8scluster]
      processors: [batch]
      exporters: [debug]
    logs:
      receivers: [k8sobjects]
      processors: [batch]
      exporters: [debug]
